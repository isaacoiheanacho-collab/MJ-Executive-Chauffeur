<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alphalima Executive Chauffeur – Fare Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Book a safe, reliable private ride with Alphalima Executive Chauffeur. Get instant fare estimates based on distance." />
  <style>
    /* ... same CSS as above ... */
  </style>
</head>
<body>
  <!-- ... same HTML as above ... -->

  <script>
    // ============================================================
    // OPENROUTESERVICE (Free, no API key needed)
    // Uses actual road networks for Nigeria
    // ============================================================

    let currentDistance = null;
    let currentFare = null;

    async function calculateDistance() {
      const pickup = document.getElementById('pickup').value.trim();
      const dropoff = document.getElementById('dropoff').value.trim();
      const fareDisplay = document.getElementById('fareDisplay');
      const fareAmount = document.getElementById('fareAmount');
      const fareDetail = document.getElementById('fareDetail');

      if (!pickup || !dropoff) {
        fareAmount.textContent = '—';
        fareDetail.textContent = 'Enter pickup and dropoff to calculate';
        fareDisplay.style.background = 'linear-gradient(135deg, #0d4f49, #0f766e)';
        currentDistance = null;
        currentFare = null;
        return;
      }

      fareAmount.textContent = '⏳ Calculating...';
      fareAmount.className = 'fare-amount loading';
      fareDetail.textContent = 'Fetching road distance from OpenRouteService...';

      try {
        // Get coordinates using OpenStreetMap
        const pickupCoords = await getCoordinatesOSM(pickup);
        const dropoffCoords = await getCoordinatesOSM(dropoff);

        if (!pickupCoords || !dropoffCoords) {
          throw new Error('Could not find one or both locations in Nigeria');
        }

        // Get road distance using OpenRouteService
        const roadDistance = await getRoadDistanceORS(pickupCoords, dropoffCoords);

        if (!roadDistance || roadDistance === 0) {
          throw new Error('Could not calculate road distance');
        }

        // Get rate per km (hidden from riders)
        const ratePerKm = parseFloat(document.getElementById('ratePerKm').value) || 350;

        // Calculate fare
        const fare = roadDistance * ratePerKm;

        currentDistance = roadDistance;
        currentFare = fare;

        fareAmount.className = 'fare-amount';
        fareAmount.textContent = `₦${Math.round(fare).toLocaleString()}`;

        let detailText = `${roadDistance.toFixed(1)} km (road distance) × ₦${ratePerKm}/km`;
        if (roadDistance < 1) {
          detailText = `Less than 1 km (${roadDistance.toFixed(1)} km) × ₦${ratePerKm}/km`;
        }
        fareDetail.textContent = detailText;

        if (fare > 15000) {
          fareDisplay.style.background = 'linear-gradient(135deg, #7c2d12, #991b1b)';
        } else if (fare > 5000) {
          fareDisplay.style.background = 'linear-gradient(135deg, #0d4f49, #0f766e)';
        } else {
          fareDisplay.style.background = 'linear-gradient(135deg, #065f46, #0d9488)';
        }

      } catch (error) {
        console.error('Error calculating distance:', error);
        fareAmount.className = 'fare-amount';
        fareAmount.textContent = '⚠️ Error';
        fareDetail.textContent = error.message || 'Please check location names or try again';
        fareDisplay.style.background = 'linear-gradient(135deg, #7c2d12, #991b1b)';
        currentDistance = null;
        currentFare = null;
      }
    }

    // OpenStreetMap geocoding
    async function getCoordinatesOSM(location) {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1&countrycodes=ng`;
      const response = await fetch(url, {
        headers: { 'User-Agent': 'Alphalima Chauffeur Booking App' }
      });
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      const data = await response.json();
      if (!data || data.length === 0) return null;
      return {
        lat: parseFloat(data[0].lat),
        lon: parseFloat(data[0].lon)
      };
    }

    // OpenRouteService - road distance (free, no API key)
    async function getRoadDistanceORS(origin, destination) {
      const url = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=5b3ce3597851110001cf6248e68e993f69b54360906e80dcec21f1f9&start=${origin.lon},${origin.lat}&end=${destination.lon},${destination.lat}`;

      const response = await fetch(url);
      const data = await response.json();

      if (!data.features || data.features.length === 0) {
        throw new Error('OpenRouteService API error');
      }

      const distance = data.features[0].properties.segments[0].distance;
      return distance / 1000; // Convert meters to km
    }

    // ... rest of JavaScript (event listeners, booking handler) same as before
  </script>
</body>
</html>
